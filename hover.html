<html>
    <title>
        HOVER
    </title>
<style>
    .box {
            width: 200px;
            height: 150px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid #334155;
        }
    .grow:hover {
            transform: scale(1.1);
            background: var(--primary);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }
    .glow:hover {
            box-shadow: 0 0 20px 5px rgba(218, 17, 175, 0.6);
            border-color: #ea159f;
            color: #e318cf;
        }
</style>
<body>
    <div class="box glow"><p>Neon Glow</p></div>
</body>
</html>
